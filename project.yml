name: AIPhone
options:
  bundleIdPrefix: id.wblue.aiphone
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  AIPhone:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
        excludes:
          - "**/.DS_Store"
          - Info.plist
          - AIPhone.entitlements
          - Resources
          - Assets.xcassets
      - path: Sources/App/Assets.xcassets
        buildPhase: resources
      - path: Sources/App/Resources
        buildPhase: resources
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: id.wblue.aiphone.app
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/App/AIPhone.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "2Y5JPG373S"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
    dependencies:
      - target: CameraExtension
        embed: true
        codeSign: true

  CameraExtension:
    type: system-extension
    platform: macOS
    sources:
      - path: Sources/CameraExtension
        excludes:
          - Info.plist
          - CameraExtension.entitlements
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: id.wblue.aiphone.app.CameraExtension
        PRODUCT_NAME: id.wblue.aiphone.app.CameraExtension
        INFOPLIST_FILE: Sources/CameraExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/CameraExtension/CameraExtension.entitlements
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "2Y5JPG373S"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
